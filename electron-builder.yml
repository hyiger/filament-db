appId: com.filamentdb.app
productName: Filament DB
copyright: Copyright 2026
artifactName: "FilamentDB-${version}-${os}-${arch}.${ext}"

directories:
  output: dist-electron
  buildResources: assets

icon: assets/icon.png

asar: false
npmRebuild: false

files:
  - electron-dist/**/*
  - standalone/**/*
  - package.json
  - node_modules/nfc-pcsc/**/*
  - node_modules/@pokusew/pcsclite/**/*
  - node_modules/mongodb-memory-server-core/**/*
  - "!src"
  - "!tests"
  - "!scripts"
  - "!electron"
  - "!.next"
  - "!.github"
  - "!docs"
  - "!coverage"

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "FilamentDB-${version}-windows-${arch}-setup.${ext}"

linux:
  category: Utility
  target:
    - target: AppImage
    - target: deb
