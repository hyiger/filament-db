name: Mobile Build

on:
  push:
    tags:
      - "mobile-v*"
    paths:
      - "packages/mobile/**"
      - "packages/shared/**"
  pull_request:
    paths:
      - "packages/mobile/**"
      - "packages/shared/**"
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' && fromJSON('["ios", "android"]') || fromJSON(format('["{0}"]', github.event.inputs.platform))) || fromJSON('["ios", "android"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ github.event.inputs.profile }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/mobile-v* ]]; then
            echo "profile=production" >> "$GITHUB_OUTPUT"
          else
            echo "profile=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ${{ matrix.platform }} (${{ steps.profile.outputs.profile }})
        working-directory: packages/mobile
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile ${{ steps.profile.outputs.profile }} \
            --non-interactive \
            --no-wait

      - name: Summary
        run: |
          echo "### 📱 Mobile Build Submitted" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platform:** ${{ matrix.platform }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Profile:** ${{ steps.profile.outputs.profile }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check build status at [expo.dev](https://expo.dev)" >> "$GITHUB_STEP_SUMMARY"
