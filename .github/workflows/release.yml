name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Next.js
        run: npm run build

      - name: Resolve symlinks in standalone output
        if: runner.os != 'Windows'
        run: |
          # Next.js standalone output contains symlinks that break Electron packaging on macOS
          cd .next/standalone
          find . -type l | while read link; do
            target=$(readlink "$link")
            rm "$link"
            cp -a "$target" "$link" 2>/dev/null || cp -r "$target" "$link"
          done

      - name: Resolve symlinks in standalone output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Windows standalone output shouldn't have symlinks, but resolve any just in case
          Get-ChildItem -Path ".next/standalone" -Recurse -Force |
            Where-Object { $_.LinkType -eq 'SymbolicLink' } |
            ForEach-Object {
              $target = $_.Target
              Remove-Item $_.FullName -Force
              Copy-Item -Path $target -Destination $_.FullName -Recurse -Force
            }

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Electron app
        run: npm run electron:pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/FilamentDB-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
