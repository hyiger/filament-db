name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: ""
          - os: windows-latest
            platform: win
            arch: ""
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PC/SC development headers (Linux x64)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Install PC/SC development headers + arm64 cross-compilation (Linux arm64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev:arm64 gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Next.js and compile Electron
        run: |
          npm run build
          npm run electron:fixlinks
          npm run electron:compile

      - name: Rebuild native modules and package (default)
        if: matrix.arch == '' || matrix.arch == 'x64'
        run: |
          npm run electron:rebuild
          npx electron-builder --config electron-builder.yml ${{ matrix.arch != '' && format('--{0}', matrix.arch) || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild native modules and package (Linux arm64)
        if: matrix.platform == 'linux-arm64'
        run: |
          npx electron-rebuild -f -w @pokusew/pcsclite --arch=arm64
          npx electron-builder --config electron-builder.yml --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/FilamentDB-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
